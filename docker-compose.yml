services:
  db:
    image: postgres:18.3
    env_file:
      - ./db/.env
    volumes:
      - db_data:/var/lib/postgresql
      - ./db/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d 
  redis:
    image: redis:8.6
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass secret
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    volumes:
        - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template
        - ./nginx/html:/var/www/html
    ports:
      - 8080:80
    env_file:
      - ./nginx/.env
    depends_on:
      - api
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    env_file:
      - ./api/.env
    volumes:
      - ./api:/app
      - /app/dist
    depends_on:
      - db
      - redis
volumes:
  db_data:
    driver: local
  redis_data:
    driver: local
